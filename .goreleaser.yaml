version: 2

project_name: git-janitor

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    binary: git-janitor
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

universal_binaries:
  - replace: true

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

checksum:
  name_template: 'checksums.txt'

nfpms:
  - vendor: jvherck
    homepage: "https://github.com/jvherck/git-janitor"
    maintainer: "Jan Van Herck"
    description: "A fast, interactive TUI for cleaning up local Git branches."
    license: MIT
    formats:
      - deb
      - rpm
      - apk

# Homebrew is handled separately in .github/workflows/release.yml

scoops:
  - repository:
      owner: jvherck
      name: scoop-bucket
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/jvherck/git-janitor"
    description: "A fast, interactive TUI for cleaning up local Git branches."
    license: MIT

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^Merge pull request"

release:
  github:
    owner: jvherck
    name: git-janitor
  footer: |
    ## How to Update
    
    If you already have Git Janitor installed, you can update to this version using your package manager:
    
    **macOS / Linux (Homebrew)**
    ```bash
    brew upgrade jvherck/tap/git-janitor
    ```
    
    **Windows (Scoop)**
    ```bash
    scoop update git-janitor
    ```
    
    **Go Users**
    ```bash
    go install github.com/jvherck/git-janitor@latest
    ```
    
    *First time installing? Check out the [full installation guide](https://github.com/jvherck/git-janitor#installation) in the README.*
